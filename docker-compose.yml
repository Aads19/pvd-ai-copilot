version: '3.9'

services:
  backend:
    build: ./backend
    container_name: pvd_backend
    env_file: ./backend/.env
    volumes:
      - ./chroma_db:/app/chroma_db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pvd_frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
